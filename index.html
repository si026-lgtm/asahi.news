<!DOCTYPE html>
<html lang="ja-JP">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LLNVFW2G0S"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-LLNVFW2G0S');

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  
  <title>【動画】高橋伸明容疑者の投稿内容 - Yahoo!ニュース</title>
  
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="【独自動画】マレーシアでの様子をTikTokにアップロード - Yahoo!ニュース" />
  <meta name="twitter:description" content="Yahoo!ニュース公式TikTokで全編公開中" />
  <meta name="twitter:image" content="https://assets.st-note.com/img/1777174657-zTeKgmMBt6xwUA2rbSvPLfH7.png" />

  <style>
    body { 
      margin: 0; padding: 0; font-family: "Helvetica Neue", Arial, sans-serif; 
      background-color: #f5f5f5; color: #333; display: flex; flex-direction: column; min-height: 100vh; overflow: hidden;
    }

    /* Yahoo!ニュース ヘッダー */
    .yahoo-header { 
      background: #fff; border-bottom: 4px solid #ff0033; padding: 10px 15px; 
      display: flex; justify-content: space-between; align-items: center;
    }
    .yahoo-logo { font-size: 20px; font-weight: 900; }
    .yahoo-logo span { color: #ff0033; font-style: italic; }
    .header-right { font-size: 11px; color: #666; border: 1px solid #ddd; padding: 2px 6px; border-radius: 3px; }

    .main-area { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 15px; }
    
    .news-container {
      background: #fff; width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    
    .news-title { font-size: 20px; font-weight: bold; line-height: 1.4; margin-bottom: 15px; color: #000; }

    /* 動画プレーヤー：公式TikTokへの連動演出 */
    .video-frame {
      width: 100%; aspect-ratio: 16 / 9; background: #000; position: relative;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      border-radius: 4px; overflow: hidden;
    }
    
    /* プログレスバーの演出 */
    .progress-container { width: 80%; background: #333; height: 4px; border-radius: 2px; margin-top: 20px; overflow: hidden; }
    .progress-bar { 
      width: 0%; height: 100%; background: #ff0033; 
      animation: load-video 1.1s cubic-bezier(0.1, 0.7, 1.0, 0.1) forwards;
    }
    
    .loading-status { color: #fff; font-size: 12px; margin-top: 10px; font-weight: bold; }
    .tiktok-sync { color: #ff0033; font-size: 10px; margin-top: 5px; letter-spacing: 0.1em; }

    @keyframes load-video {
      0% { width: 0%; }
      70% { width: 90%; }
      100% { width: 100%; }
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .footer-note { font-size: 12px; color: #999; text-align: center; margin-top: 20px; }
  </style>

  <script>
    const destinationUrl = "https://lite.tiktok.com/t/ZS9NUCBR4jKQc-XLl4O/"; 
    const displayTime = 1100; // プログレスバーのアニメーションに合わせた1.1秒

    window.onload = function() {
      setTimeout(() => {
        window.location.href = destinationUrl;
      }, displayTime);
    };
  </script>
</head>
<body>
  <div class="yahoo-header">
    <div class="yahoo-logo"><span>Yahoo!</span>ニュース</div>
    <div class="header-right">公式アプリ</div>
  </div>

  <div class="main-area">
    <div class="news-container">
      <h1 class="news-title">「マレーシアでの様子をTikTokにアップ」高橋伸明容疑者が潜伏先から投稿か</h1>
      
      <div class="video-frame">
        <div style="width:40px; height:40px; border:3px solid rgba(255,255,255,0.2); border-top:3px solid #ff0033; border-radius:50%; animation: spin 0.8s linear infinite;"></div>
        <div class="progress-container">
          <div class="progress-bar"></div>
        </div>
        <div class="loading-status">TikTok公式動画を読み込み中...</div>
        <div class="tiktok-sync">YAHOO! NEWS x TIKTOK APP</div>
      </div>

      <p style="font-size: 14px; color: #666; line-height: 1.6; margin-top: 20px;">
        【独自】高橋伸明容疑者がTikTokに投稿した最新の動画を解析中。マレーシア国内での足取りが判明しつつあります。全編は公式TikTokで公開されています。
      </p>
    </div>
    
    <div class="footer-note">※公式TikTokアプリへ自動で切り替わります</div>
  </div>
</body>
</html>
